<!DOCTYPE html>
<html>
<head>
<title>Unemployed Expense Form</title>
<script>

function validateUnemployed(){

let budget = document.getElementById("budget").value;
let food = document.getElementById("food").value;
let transport = document.getElementById("transport").value;
let internet = document.getElementById("internet").value;
let saving = document.getElementById("saving").value;
if(isNaN(budget) || budget <= 0){
alert("Please enter a valid number in Budget.");
return false;
}
if(isNaN(food) || food < 0){
alert("Please enter a valid number in Food Expense.");
return false;
}
if(isNaN(transport) || transport < 0){
alert("Please enter a valid number in Transport Expense.");
return false;
}
if(isNaN(internet) || internet < 0){
alert("Please enter a valid number in Mobile / Internet Expense.");
return false;
}
if(isNaN(saving) || saving < 0){
alert("Please enter a valid number in Monthly Saving Amount.");
return false;
}

return true;
}
</script>
<style>
body{
    font-family: Arial;
    background:#f5f5f5;
}
.container{
    width:420px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:25px;
    border-radius:10px;
}
input, select{
    width:100%;
    padding:8px;
    margin:8px 0;
}
button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
}
</style>
</head>
<body>
<div class="container">
<h2>Unemployed Expense Form</h2>
<form  action="unemp.php" method="post" onsubmit="return validateUnemployed()">
<label>Full Name</label>
<input type="text" name="name" required>
<label>Source of Money</label>
<select name="source">
<option>Family Support</option>
<option>Savings</option>
<option>Freelancing</option>
<option>Other</option>
</select>
<label>Monthly Available Budget</label>
<input type="text" id="budget" name="budget" required>
<h3>Monthly Expenses</h3>
<label>Food Expense</label>
<input type="text" id="food" name="food_expense">
<label>Transport Expense</label>
<input type="text" id="transport" name="transport_expense" required>
<label>Mobile / Internet</label>
<input type="text" id="internet" name="internet_expense" required>
<label>Learning / Job Search Expense</label>
<input type="text" id="learning" name="learning_expense">
<label>Other Expenses</label>
<input type="text" id="other" name="other_expense">
<label>Monthly Saving Amount</label>
<input type="text" id="saving" name="saving" required>
<label>Saving Goal</label>
<input type="text" name="goal">
<button type="submit">Submit</button>
</form>
</div>
</body>
</html>
