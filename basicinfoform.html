<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Basic Information</title>
<link rel="stylesheet" href="formstyle.css">
</head>

<body>

<div class="form-container">

<h1 class="title">Basic Information</h1>

<form id="generalForm" action="basicinfoform.php" method="post">

<label>Full Name</label>
<input type="text" placeholder="Enter your name" name="name" required>

<label>Age</label>
<input type="number" placeholder="Enter your age" name="age" min="12" max="100" required>

<label>Gender</label>
<select name="gender" required>
<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
<br>
<label>Occupation</label>
<br>

<label>
<input type="radio" name="occupation" value="student"> Student
</label>

<label>
<input type="radio" name="occupation" value="employed"> Employed
</label>

<label>
<input type="radio" name="occupation" value="housewife"> Homemaker
</label>

<label>
<input type="radio" name="occupation" value="self-employed"> Self-Employed
</label>

<label>
<input type="radio" name="occupation" value="unemployed"> Unemployed
</label>



<br><br>
<button type="submit">Next</button>

</form>

</div>

</body>
</html>
