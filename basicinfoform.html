<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Basic Information</title>
<link rel="stylesheet" href="formstyle.css">
<script>
function validateBasicInfo(){
    let name = document.getElementById("name").value.trim();
    let age = document.getElementById("age").value;
    let gender = document.querySelector('select[name="gender"]').value;
    let occupation = document.querySelector('input[name="occupation"]:checked');

    // Validate name
    if(name === ""){
        alert("Please enter your full name.");
        return false;
    }

    if(name.length < 2 || name.length > 100){
        alert("Name must be between 2 and 100 characters.");
        return false;
    }

    // Validate age
    if(age === ""){
        alert("Please enter your age.");
        return false;
    }

    if(isNaN(age) || age < 12 || age > 100){
        alert("Please enter a valid age between 12 and 100.");
        return false;
    }

    // Validate gender
    if(gender === ""){
        alert("Please select your gender.");
        return false;
    }

    // Validate occupation
    if(!occupation){
        alert("Please select an occupation.");
        return false;
    }

    return true;
}
</script>
</head>

<body>

<div class="form-container">

<h1 class="title">Basic Information</h1>

<form id="generalForm" action="basicinfoform.php" method="post" onsubmit="return validateBasicInfo()">

<label>Full Name</label>
<input type="text" placeholder="Enter your name" name="name" id="name" required>

<label>Age</label>
<input type="text" placeholder="Enter your age" name="age" id="age" required>

<label>Gender</label>
<select name="gender" required>
<option value="">Select</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select>
<br>
<label>Occupation</label>
<br>

<label>
<input type="radio" name="occupation" value="student"> Student
</label>

<label>
<input type="radio" name="occupation" value="employed"> Employed
</label>

<label>
<input type="radio" name="occupation" value="housewife"> Homemaker
</label>

<label>
<input type="radio" name="occupation" value="self-employed"> Self-Employed
</label>

<label>
<input type="radio" name="occupation" value="unemployed"> Unemployed
</label>



<br><br>
<button type="submit">Next</button>

</form>

</div>

</body>
</html>
