<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Self-Employed Expense Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('expenseimage.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea {
            height: 80px;
            resize: vertical;
        }

        button {
            width: 100%;
            background-color: #4caf50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Self-Employed Expense Form</h2>
        <form id="expenseForm" action="#" method="post">
            <label for="business">What is your business or profession?</label>
            <input type="text" id="business" name="business" required />

            <label for="income">What is your approximate monthly income? ($)</label>
            <input type="number" id="income" name="income" min="0" step="0.01" required />

            <label for="businessExpenses">How much do you spend on business expenses? ($)</label>
            <input type="number" id="businessExpenses" name="businessExpenses" min="0" step="0.01" required />

            <label for="rent">How much do you spend on rent or workspace? ($)</label>
            <input type="number" id="rent" name="rent" min="0" step="0.01" required />

            <label for="materials">How much do you spend on materials or supplies? ($)</label>
            <input type="number" id="materials" name="materials" min="0" step="0.01" required />

            <label for="utilities">How much do you spend on utilities (electricity, internet)? ($)</label>
            <input type="number" id="utilities" name="utilities" min="0" step="0.01" required />

            <label for="personalExpenses">How much do you spend on personal expenses? ($)</label>
            <input type="number" id="personalExpenses" name="personalExpenses" min="0" step="0.01" required />

            <label for="otherExpenses">Do you have any other expenses? (Please describe)</label>
            <textarea id="otherExpenses" name="otherExpenses"></textarea>

            <label for="savings">How much do you save every month? ($)</label>
            <input type="number" id="savings" name="savings" min="0" step="0.01" required />

            <label for="savingGoal">What is your saving goal or item you want to purchase?</label>
            <input type="text" id="savingGoal" name="savingGoal" />

            <button type="submit">Submit Form</button>
        </form>
    </div>

    <script>
        // Optional: Add any JavaScript validation if needed
        document.getElementById('expenseForm').addEventListener('submit', function (e) {
            // Basic validation can be added here
            console.log('Form submitted');
        });
    </script>
</body>
</html>
