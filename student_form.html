
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Expense Form</title>
<link rel="stylesheet" href="formstyle.css">
</head>

<body>

<div class="form-container">

<h1>Student Expense Details</h1><br><br>

<form action="student_info.php" method="get">

<label>Monthly Pocket Money / Allowance</label>
<input type="number" name="pocket_money" required>

<label>Main Source of Income</label>
<select name="income_source" required>
<option>Select</option>
<option>Parents</option>
<option>Scholarship</option>
<option>Part-time Job</option>
</select>

<label>Food / Mess Expense (per month)</label>
<input type="number" name="food_expense" required>

<label>Transportation Expense</label>
<input type="number" name="transportation_expense" required>

<label>Books / Study Materials</label>
<input type="number" name="books_expense" required>

<label>Entertainment / Outings</label>
<input type="number" name="entertainment_expense" required>

<label>Mobile / Internet Recharge</label>
<input type="number" name="mobile_expense" required>

<label>Other Monthly Expenses</label>
<input type="number" name="other_expense" value="0" min="0" step="0.01">

<label>Monthly Savings</label>
<input type="number" name="savings" required>

<label>Saving Goal (Laptop / Phone / Trip etc.)</label>
<input type="text" name="saving_goal" required>

<label>Goals Amount</label>
<input type="number" name="goals_amount" required><br><br>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
