<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Expense Form</title>
<link rel="stylesheet" href="formstyle.css">

<style>
  /* Inline warning style */
  #savingWarning {
    color: red;
    font-size: 14px;
    display: none;
    margin-top: 5px;
  }
</style>

</head>
<body>

<div class="form-container">

<h1>Student Expense Details</h1><br><br>

<form id="studentForm" action="student_form.php" method="post">

  <!-- Income Fields -->
  <label>Monthly Pocket Money / Allowance</label>
  <input type="number" name="pocket_money" id="pocketMoney" required>

  <label>Other Income (Optional)</label>
  <input type="number" name="other_income" id="otherIncome" value="0">

  <label>Main Source of Income</label>
  <select name="income_source" required>
    <option>Select</option>
    <option>Parents</option>
    <option>Scholarship</option>
    <option>Part-time Job</option>
  </select>

  <!-- Expense Fields -->
  <label>Food / Mess Expense (per month)</label>
  <input type="number" name="food_expense" id="foodExpense" required>

  <label>Transportation Expense</label>
  <input type="number" name="transportation_expense" id="transportationExpense" required>

  <label>Books / Study Materials</label>
  <input type="number" name="books_expense" id="booksExpense" required>

  <label>Entertainment / Outings</label>
  <input type="number" name="entertainment_expense" id="entertainmentExpense" required>

  <label>Mobile / Internet Recharge</label>
  <input type="number" name="mobile_expense" id="mobileExpense" required>

  <label>Other Monthly Expenses</label>
  <input type="number" name="other_expense" id="otherExpense" value="0">

  <!-- Monthly Saving -->
  <label>Monthly Savings</label>
  <input type="number" name="savings" id="savingsInput" required>
  <span id="savingWarning">Calculated monthly saving does not match your entry.</span>

  <!-- Goal Fields -->
  <label>Saving Goal (Laptop / Phone / Trip etc.)</label>
  <input type="text" name="saving_goal" id="savingGoal" required>

  <label>Goals Amount</label>
  <input type="number" name="goals_amount" id="goalAmount" required><br><br>

  <button type="submit">Submit</button>

</form>

</div>

<script>
  const form = document.getElementById('studentForm');
  const pocketMoney = document.getElementById('pocketMoney');
  const otherIncome = document.getElementById('otherIncome');
  const foodExpense = document.getElementById('foodExpense');
  const transportationExpense = document.getElementById('transportationExpense');
  const booksExpense = document.getElementById('booksExpense');
  const entertainmentExpense = document.getElementById('entertainmentExpense');
  const mobileExpense = document.getElementById('mobileExpense');
  const otherExpense = document.getElementById('otherExpense');
  const savingsInput = document.getElementById('savingsInput');
  const savingWarning = document.getElementById('savingWarning');

  form.addEventListener('submit', function(e){
    // Calculate expected monthly saving
    const totalIncome = parseFloat(pocketMoney.value || 0) + parseFloat(otherIncome.value || 0);
    const totalExpense = parseFloat(foodExpense.value || 0) + parseFloat(transportationExpense.value || 0) +
                         parseFloat(booksExpense.value || 0) + parseFloat(entertainmentExpense.value || 0) +
                         parseFloat(mobileExpense.value || 0) + parseFloat(otherExpense.value || 0);
    const calculatedSaving = totalIncome - totalExpense;
    const userSaving = parseFloat(savingsInput.value || 0);

    // Show warning if mismatch
    if(Math.abs(calculatedSaving - userSaving) > 0.01){
      e.preventDefault(); // prevent form submission
      savingWarning.style.display = 'inline';
    } else {
      savingWarning.style.display = 'none';
    }
  });
</script>

</body>
</html>
