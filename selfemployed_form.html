<!DOCTYPE html>
<html>
<head>
<title>Self Employed Expense Form</title>
<script>
function validateSelf()
{
let income = document.getElementById("income").value;
let rent = document.getElementById("rent").value;
let materials = document.getElementById("materials").value;
let salary = document.getElementById("salary").value;
let electricity = document.getElementById("electricity").value;
let food = document.getElementById("food").value;
let transport = document.getElementById("transport").value;
let saving = document.getElementById("saving").value;
if(isNaN(income)){
alert("Please enter numbers only in Monthly Income.");
return false;
}
if(isNaN(rent) ||rent<0)
{
alert("Please enter a valid number in Rent.");
return false;
}
if(isNaN(materials) || materials < 0){
alert("Please enter a valid number in Materials.");
return false;
}
if(isNaN(salary) || salary < 0){
alert("Please enter a valid number in Staff Salary.");
return false;
}
if(isNaN(electricity) || electricity < 0){
alert("Please enter a valid number in Electricity / Internet.");
return false;
}
if(isNaN(food) || food < 0){
alert("Please enter a valid number in Food / Grocery.");
return false;
}
if(isNaN(transport) || transport < 0){
alert("Please enter a valid number in Transport.");
return false;
}
if(isNaN(saving) || saving < 0){
alert("Please enter a valid number in Monthly Saving Amount.");
return false;
}
return true;
}
</script>
<style>
body{
    font-family: Arial;
    background:#f5f5f5;
}
.container{
    width:420px;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:25px;
    border-radius:10px;
}
input{
    width:100%;
    padding:8px;
    margin:8px 0;
}
button{
    width:100%;
    padding:10px;
    background:#28a745;
    color:white;
    border:none;
}
</style>
</head>
<body>
<div class="container">
<h2>Self Employed Expense Form</h2>
<form action="selfemp.php" method="post" onsubmit="return validateSelf()">
<label>Full Name</label>
<input type="text" name="name"  required>
<label>Business / Profession</label>
<input type="text" name="business" required>
<label>Approx Monthly Income</label>
<input type="text" id="income" name="income" required>
<label>Additional Income if any?</label>
<input type="text" id="extra_income" name="extra_income" value=0>
<h3>Business Expenses</h3>
<label>Shop / Office Rent</label>
<input type="text" id="rent" name="rent_expense">
<label>Raw Materials / Supplies</label>
<input type="text" id="materials" name="materials_expense" required>
<label>Staff Salary</label>
<input type="text" id="salary" name="salary_expense" required>
<label>Electricity / Internet</label>
<input type="text" id="electricity" name="utilities_expense">
<h3>Personal Expenses</h3>
<label>Food / Grocery</label>
<input type="text"  id="food" name="food_expense" required>
<label>Transport</label>
<input type="text" id="transport" name="transport_expense" required>
<label>Other Expenses</label>
<input type="text" id="other" name="other_expense" value=0>
<label>Monthly Saving Amount</label>
<input type="text" id="saving" name="saving" required>
<label>Saving Goal</label>
<input type="text" name="goal">
<button type="submit">Submit</button>
</form>
</div>
</body>
</html>
